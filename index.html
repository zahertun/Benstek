<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenS'Tek Finance Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 pb-10">

    <nav class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold"><i class="fas fa-calculator mr-2"></i>BenS'Tek Caisse</h1>
            <div id="connexion-status" class="text-[10px] bg-yellow-500 text-black px-2 py-1 rounded font-bold uppercase">Connexion...</div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-3 space-y-4">
        
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center justify-center h-52">
        <span class="text-slate-400 text-xs font-bold uppercase tracking-wider">Solde Réel en Caisse</span>
        <p id="soldeTotal" class="text-4xl font-black text-blue-700 mt-2">0.00 TND</p>
    </div>

    <div class="md:col-span-2 bg-white p-4 rounded-2xl shadow-sm border border-slate-200 h-52 flex flex-col">
        <div class="flex justify-between items-center mb-2">
            <h3 class="text-[10px] font-bold uppercase text-slate-400 tracking-widest">Statistiques</h3>
            <select id="filtreTemps" class="text-xs border border-slate-200 rounded-lg p-1 bg-slate-50 outline-none font-bold text-slate-600">
                <option value="tout">Toutes les données</option>
                <option value="mois">Ce mois-ci</option>
                <option value="semaine">Cette semaine</option>
            </select>
        </div>
        
        <div class="flex flex-row items-center justify-around flex-grow">
            <div class="w-1/2 h-32">
                <canvas id="statsChart"></canvas>
            </div>
            <div class="flex flex-col space-y-3">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Revenus</span>
                    <span id="txtRevenus" class="text-lg font-black text-green-600">0.00 TND</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Dépenses</span>
                    <span id="txtDepenses" class="text-lg font-black text-red-500">0.00 TND</span>
                </div>
            </div>
        </div>
    </div>
</div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-bold mb-4 text-slate-700 uppercase">Nouvelle Opération</h3>
                <form id="transactionForm" class="space-y-3">
                    <select id="type" class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="entree">🟢 Entrée (Vente/Réparation)</option>
                        <option value="sortie">🔴 Sortie (Achat/Frais)</option>
                    </select>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="categorie" class="p-3 border border-slate-200 rounded-xl bg-slate-50 text-sm outline-none">
                            <option value="Smartphone">📱 Smartphone</option>
                            <option value="PC">💻 PC</option>
                            <option value="Réparation">🛠️ Réparation</option>
                            <option value="Accessoires">🔌 Accessoires</option>
                            <option value="Autre">📦 Autre</option>
                        </select>
                        <input type="number" id="montant" placeholder="Montant" step="0.1" required class="p-3 border border-slate-200 rounded-xl bg-slate-50 text-sm font-bold outline-none">
                    </div>
                    <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                        ENREGISTRER
                    </button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-[350px]">
                <h3 class="text-sm font-bold mb-4 text-slate-700 uppercase">Historique Récent</h3>
                <div class="overflow-y-auto flex-grow custom-scrollbar">
                    <table class="w-full text-sm">
                        <tbody id="historiqueListe" class="divide-y divide-slate-100 text-slate-600">
                            <tr><td class="py-10 text-center text-slate-400">Chargement des données...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- COPIE TES CLÉS CI-DESSOUS ---
    const firebaseConfig = {
        apiKey: "AIzaSyCCkFdl-rN3yueZ7L89HrblXBoXIYc4CSU",
        authDomain: "benstek-finance.firebaseapp.com",
        projectId: "benstek-finance",
        storageBucket: "benstek-finance.firebasestorage.app",
        messagingSenderId: "972183439685",
        appId: "1:972183439685:web:5166beaa8b4608fe7e562c"
    };

        // Init
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const transactionsRef = collection(db, "transactions");
        let chartInstance = null;

        // Statut de connexion
        const statusEl = document.getElementById('connexion-status');

        // Lecture en temps réel
        const q = query(transactionsRef, orderBy("date", "desc"));
        onSnapshot(q, (snapshot) => {
            statusEl.textContent = "Connecté ✅";
            statusEl.className = "text-[10px] bg-green-500 text-white px-2 py-1 rounded font-bold uppercase";
            
            const trans = [];
            snapshot.forEach((doc) => trans.push({ id: doc.id, ...doc.data() }));
            
            majInterface(trans);
        }, (error) => {
            statusEl.textContent = "Erreur ❌";
            statusEl.className = "text-[10px] bg-red-500 text-white px-2 py-1 rounded font-bold uppercase";
            console.error(error);
        });

        // Formulaire
        document.getElementById('transactionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = "ENCOURS...";

            await addDoc(transactionsRef, {
                type: document.getElementById('type').value,
                categorie: document.getElementById('categorie').value,
                montant: parseFloat(document.getElementById('montant').value),
                date: new Date().toISOString()
            });

            e.target.reset();
            btn.disabled = false;
            btn.textContent = "ENREGISTRER";
        });

        // Suppression
        window.supprimer = async (id) => {
            if(confirm("Supprimer ce mouvement ?")) {
                await deleteDoc(doc(db, "transactions", id));
            }
        };

        // Variable globale pour stocker les transactions
let toutesLesTransactions = [];

function majInterface(trans) {
    toutesLesTransactions = trans; // On stocke pour le filtre
    
    // 1. Le Solde Global (lui ne change jamais, c'est l'argent réel en caisse)
    const soldeGlobal = trans.reduce((acc, curr) => curr.type === 'entree' ? acc + curr.montant : acc - curr.montant, 0);
    document.getElementById('soldeTotal').textContent = `${soldeGlobal.toFixed(2)} TND`;

    // 2. Remplissage de l'historique (les 20 derniers)
    const list = document.getElementById('historiqueListe');
    if(trans.length === 0) {
        list.innerHTML = '<tr><td class="py-10 text-center text-slate-400 italic">Aucune opération.</td></tr>';
    } else {
        list.innerHTML = trans.slice(0, 20).map(t => `
            <tr class="hover:bg-slate-50 transition-colors border-b border-slate-50">
                <td class="py-3 text-[10px] font-bold text-slate-300 w-10 uppercase">${new Date(t.date).toLocaleDateString('fr-TN', {day:'2-digit', month:'2-digit'})}</td>
                <td class="py-3 font-bold text-slate-700">${t.categorie}</td>
                <td class="py-3 text-right font-black ${t.type === 'entree' ? 'text-green-600' : 'text-red-500'}">
                    ${t.type === 'entree' ? '+' : '-'}${t.montant.toFixed(2)}
                </td>
                <td class="py-3 text-right pl-3">
                    <button onclick="supprimer('${t.id}')" class="text-slate-200 hover:text-red-400 transition-colors text-xs">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    // 3. Lancer le calcul des stats filtrées
    appliquerFiltre();
}

// Fonction pour filtrer selon la date
function appliquerFiltre() {
    const filtre = document.getElementById('filtreTemps').value;
    const maintenant = new Date();
    
    let transFiltrees = toutesLesTransactions;

    if (filtre === 'mois') {
        transFiltrees = toutesLesTransactions.filter(t => {
            const d = new Date(t.date);
            return d.getMonth() === maintenant.getMonth() && d.getFullYear() === maintenant.getFullYear();
        });
    } else if (filtre === 'semaine') {
        const uneSemaineGlace = new Date();
        uneSemaineGlace.setDate(maintenant.getDate() - 7);
        transFiltrees = toutesLesTransactions.filter(t => new Date(t.date) > uneSemaineGlace);
    }

    majGraph(transFiltrees);
}

// Écouteur pour le changement de filtre
document.getElementById('filtreTemps').addEventListener('change', appliquerFiltre);

function majGraph(trans) {
    const ctx = document.getElementById('statsChart').getContext('2d');
    const inT = trans.filter(t => t.type === 'entree').reduce((s, t) => s + t.montant, 0);
    const outT = trans.filter(t => t.type === 'sortie').reduce((s, t) => s + t.montant, 0);

    document.getElementById('txtRevenus').textContent = `${inT.toFixed(2)} TND`;
    document.getElementById('txtDepenses').textContent = `${outT.toFixed(2)} TND`;

    if(chartInstance) chartInstance.destroy();
    
    const dataVal = (inT === 0 && outT === 0) ? [1] : [inT, outT];
    const dataCol = (inT === 0 && outT === 0) ? ['#f1f5f9'] : ['#2563eb', '#ef4444'];

    chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
            datasets: [{ data: dataVal, backgroundColor: dataCol, borderWidth: 0 }]
        },
        options: {
            maintainAspectRatio: false,
            cutout: '80%',
            plugins: { legend: { display: false } }
        }
    });
}
    </script>
</body>
</html>
